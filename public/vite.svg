<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="auraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Aura Shape -->
  <rect x="20" y="20" width="60" height="60" rx="16" fill="url(#auraGradient)" filter="url(#glow)" opacity="0.9" />
  
  <!-- Inner Code Symbol -->
  <path d="M45 38 L35 50 L45 62" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M55 38 L65 50 L55 62" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="50" cy="50" r="32" stroke="white" stroke-width="2" stroke-opacity="0.2" fill="none" />
</svg>